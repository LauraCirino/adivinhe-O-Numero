<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caçador de tesouro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Desafio do caçador de tesouro</h1>
    <p>Escolha um número de 1 a 5:</p>
    <input type="number" id="escolha" min="1" max="5">
    <button onclick="procurarTesouro()">Procurar tesouro</button>
    <p id="resultado"></p>

    <script src="script.js"></script>
</body>
</html>
